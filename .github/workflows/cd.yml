name: CD

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://your-k8s-cluster-domain.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------
      # Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: "1.8.0"
      - name: Terraform init
        run: cd terraform && terraform init
      - name: Terraform Apply
        run: cd terraform && terraform apply -auto-approve

      # ------------------------------------------
      # Deploy Docker images to ECR or GCR
      - name: Auth to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build API image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/banking-api:${{ github.sha }} ./src/api
          docker push ghcr.io/${{ github.repository_owner }}/banking-api:${{ github.sha }}
      - name: Build ML image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/ml-service:${{ github.sha }} ./ml_service
          docker push ghcr.io/${{ github.repository_owner }}/ml-service:${{ github.sha }}
      - name: Update K8s manifests with new image tags
        run: |
          sed -i "s/banking-api:.*/banking-api:${{ github.sha }}/g" kube/*.yaml
          sed -i "s/ml-service:.*/ml-service:${{ github.sha }}/g" kube/*.yaml
      - name: Apply K8s manifests
        uses: Azure/k8s-set-context@v2
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_DATA }}
        run: kubectl apply -k ./kube
